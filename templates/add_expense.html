<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Expense</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6ff;
}

.wrapper{
    width:950px;
    display:flex;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.left{
    width:40%;
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    color:white;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left i{
    font-size:42px;
    margin-bottom:18px;
}

.left h2{
    font-size:26px;
    margin-bottom:10px;
}

.left p{
    font-size:14px;
    opacity:0.9;
    line-height:1.5;
}


.stat{
    margin-top:25px;
    padding:14px;
    background:rgba(255,255,255,0.12);
    border-radius:14px;
    font-size:13px;
}


.right{
    width:60%;
    background:white;
    padding:40px;
}


.header h3{
    font-size:22px;
    color:#111827;
}

.header p{
    font-size:13px;
    color:#6b7280;
    margin-top:4px;
    margin-bottom:20px;
}

.form-grp{
    margin-bottom:18px;
}

label{
    display:flex;
    align-items:center;
    gap:6px;

    font-size:13px;
    font-weight:600;
    color:#374151;

    margin-bottom:6px;
}

input,
select,
textarea{
    width:100%;
    padding:12px 14px;

    border-radius:12px;
    border:1px solid #e5e7eb;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,0.12);
}


button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:14px;

    background:#4f46e5;
    color:white;

    font-size:15px;
    font-weight:600;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#4338ca;
    transform:translateY(-2px);
}


.actions{
    display:flex;
    gap:12px;
    margin-top:22px;
}

.actions a{
    flex:1;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
    text-align:center;

    font-size:13px;
    font-weight:600;

    color:#4f46e5;
    background:#eef2ff;

    transition:0.3s;
}

.actions a:hover{
    background:#e0e7ff;
    transform:translateY(-2px);
}


@media(max-width:900px){
    .wrapper{
        flex-direction:column;
        width:95%;
    }

    .left,.right{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="wrapper">

   
    <div class="left">

        <i class="bi bi-wallet2"></i>

        <h2>Expense Tracker</h2>

        <p>
            Track your spending smarter.  
            Add expenses, categorize them, and visualize your financial habits.
        </p>

        <div class="stat">
            <i class="bi bi-lightning-charge"></i>
            Fast, simple & organized expense entry system
        </div>

    </div>
 <div class="right">

        <div class="header">
            <h3>Add New Expense</h3>
            <p>Enter details below to record your spending</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-grp">
                <label><i class="bi bi-currency-rupee"></i> Amount</label>
                {{form.amount}}
            </div>

            <div class="form-grp">
                <label><i class="bi bi-calendar-date"></i> Date</label>
                <input type="date" name="date" value="{{default_date}}" required>
            </div>

            <div class="form-grp">
                <label><i class="bi bi-grid-3x3-gap"></i> Category</label>
                {{form.category}}
            </div>

        

            <button type="submit">
                <i class="bi bi-plus-circle"></i>
                Add Expense
            </button>

        </form>

        <div class="actions">

            <a href="{% url 'add_cat' %}">
                <i class="bi bi-folder-plus"></i>
                Category
            </a>

            <a href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

        </div>

    </div>

</div>

</body>
</html>
