<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Category</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .wrapper {
        width: 900px;
        display: flex;
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      }

      .left {
        width: 40%;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .left i {
        font-size: 48px;
        margin-bottom: 20px;
      }

      .left h2 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .left p {
        font-size: 14px;
        opacity: 0.9;
        line-height: 1.5;
      }

      .right {
        width: 60%;
        padding: 40px;
      }

      .header {
        margin-bottom: 25px;
      }

      .header h3 {
        font-size: 22px;
        color: #111827;
      }

      .header span {
        font-size: 13px;
        color: #6b7280;
      }

      .tag {
        display: inline-block;
        background: #eef2ff;
        color: #4f46e5;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 20px;
        margin-bottom: 10px;
      }

      label {
        font-size: 13px;
        color: #374151;
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
        font-weight: bold;
      }

      select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        outline: none;
        font-size: 14px;
      }

      select:focus {
        border-color: #4f46e5;
      }
      .custom-input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #d1d5db;
        outline: none;
        font-size: 14px;
        margin-top: 12px;
        background: #f8fafc;
        transition: 0.3s;
        color: #111827;
      }

      .custom-input:focus {
        border-color: #4f46e5;
        background: white;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 14px 18px;

        border: none;
        border-radius: 14px;

        background: linear-gradient(135deg, #6366f1, #4f46e5, #22c55e);
        background-size: 200% 200%;

        color: white;
        font-size: 15px;
        font-weight: 600;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;

        cursor: pointer;

        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.25);

        animation: move 4s ease infinite;

        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
      }

      button:active {
        transform: scale(0.96);
      }

      @keyframes move {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .links {
        margin-top: 22px;

        display: flex;
        padding: 6px;

        border-radius: 18px;

        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(12px);

        border: 1px solid rgba(0, 0, 0, 0.06);

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .links a {
        flex: 1;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;

        padding: 12px 10px;

        text-decoration: none;
        font-size: 13px;
        font-weight: 600;

        color: #374151;

        border-radius: 14px;

        transition: 0.3s ease;
      }

      .links a i {
        font-size: 16px;
      }

      .links a:hover {
        background: #4f46e5;
        color: white;
        transform: translateY(-2px);
      }

      .links a:active {
        transform: scale(0.97);
      }

      @media (max-width: 900px) {
        .wrapper {
          flex-direction: column;
          width: 95%;
        }

        .left,
        .right {
          width: 100%;
        }

        .left {
          padding: 30px;
        }

        .right {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="left">
        <i class="bi bi-folder-plus"></i>
        <h2>Category Manager</h2>
        <p>
          Organize your expenses properly to get better insights, charts and
          financial clarity in your dashboard.
        </p>
      </div>

      <div class="right">
        <div class="header">
          <span class="tag">Finance Setup</span>
          <h3>Add New Category</h3>
          <span>Create structured expense categories</span>
        </div>

        <form method="POST">
          {% csrf_token %}

          <label>Main Category</label>
          <select id="mainCategory" onchange="updateCategory()">
            <option value="">Select category</option>
            <option value="essentials">Essentials</option>
            <option value="transport">Transport</option>
            <option value="personal">Personal</option>
            <option value="lifestyle">Lifestyle</option>
            <option value="education">Education</option>
            <option value="health">Health</option>
            <option value="finance">Finance</option>
            <option value="misc">Others</option>
          </select>

          <label>Sub Category</label>

          <select id="subCategory" name="name">
            <option value="">Select type</option>
          </select>

          <input
            type="text"
            id="customCategory"
            name="custom_category"
            class="custom-input"
            placeholder="Type your custom category..."
            style="display: none"
          />

          <button type="submit">
            <i class="bi bi-plus-circle"></i>
            Add Category
          </button>
        </form>

        <div class="links">
          <a href="{% url 'add_exp' %}">
            <i class="bi bi-cash-coin"></i>
            Expense
          </a>

          <a href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2"></i>
            Dashboard
          </a>
        </div>
      </div>
    </div>

    <script>
      function updateCategory() {
        let main = document.getElementById("mainCategory").value;
        let sub = document.getElementById("subCategory");
        let custom = document.getElementById("customCategory");

        sub.innerHTML = '<option value="">Select type</option>';
        custom.style.display = "none";

        let options = [];

        if (main == "essentials") {
          options = ["Food", "Groceries", "Rent", "Bills", "Internet"];
        } else if (main == "transport") {
          options = ["Fuel", "Bus", "Train", "Taxi", "Parking"];
        } else if (main == "personal") {
          options = ["Shopping", "Clothing", "Gym", "Salon"];
        } else if (main == "lifestyle") {
          options = ["Movies", "Travel", "Dining", "Entertainment"];
        } else if (main == "education") {
          options = ["Books", "Fees", "Courses"];
        } else if (main == "health") {
          options = ["Medicine", "Doctor", "Insurance"];
        } else if (main == "finance") {
          options = ["EMI", "Loan", "Investment", "Savings"];
        } else if (main == "misc") {
          custom.style.display = "block";
        }

        options.forEach(function (opt) {
          let option = document.createElement("option");
          option.value = opt;
          option.text = opt;
          sub.appendChild(option);
        });
      }
    </script>
  </body>
</html>
