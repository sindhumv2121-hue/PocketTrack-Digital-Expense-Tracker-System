<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Income</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f5f9;
    padding:30px;
}
.container{
    width:100%;
    max-width:1100px;
    display:flex;
    border-radius:35px;
    overflow:hidden;
    background:white;
    box-shadow:0 25px 60px rgba(0,0,0,.12);
}
.left{
    flex:1;
    padding:45px;
    color:white;
    position:relative;
    background:linear-gradient(135deg,#16a34a,#22c55e,#4ade80);
    overflow:hidden;
}
.left::before{
    content:"";
    position:absolute;
    width:240px;
    height:240px;
    border-radius:50%;
    background:rgba(255,255,255,.10);
    top:-70px;
    right:-60px;
}

.left::after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    bottom:-50px;
    left:-40px;
}
.logo{
    width:78px;
    height:78px;
    border-radius:24px;
    background:rgba(255,255,255,.15);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    margin-bottom:30px;
    backdrop-filter:blur(8px);
}
.left h1{
    font-size:38px;
    line-height:1.2;
    margin-bottom:14px;
}
.left p{
    color:#ecfdf5;
    font-size:14px;
    line-height:1.8;
    margin-bottom:30px;
}
.feature{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
}
.feature i{
    width:42px;
    height:42px;
    border-radius:12px;
    background:rgba(255,255,255,.18);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:16px;
}
.right{
    flex:1.2;
    padding:45px;
}
.right h2{
    font-size:30px;
    color:#0f172a;
    margin-bottom:6px;
}
.sub{
    color:#64748b;
    font-size:14px;
    margin-bottom:22px;
}
.month{
    background:#f0fdf4;
    border:1px solid #bbf7d0;
    color:#15803d;
    padding:14px;
    border-radius:16px;
    text-align:center;
    font-size:14px;
    margin-bottom:24px;
}
.group{
    margin-bottom:18px;
}
label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:600;
    color:#334155;
}
.input-box{
    position:relative;
}
.input-box i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#16a34a;
}
input{
    width:100%;
    padding:15px 15px 15px 44px;
    border-radius:16px;
    border:1px solid #e2e8f0;
    background:#f8fafc;
    outline:none;
    transition:.3s;
    font-size:14px;
}
input:focus{
    border-color:#22c55e;
    background:white;
    box-shadow:0 0 0 4px rgba(34,197,94,.12);
}
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    background:linear-gradient(135deg,#16a34a,#22c55e);
    color:white;
    font-size:15px;
    font-weight:700;
    letter-spacing:.3px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    position:relative;
    overflow:hidden;
    transition:.35s;
    box-shadow:0 12px 30px rgba(34,197,94,.25),inset 0 1px 0 rgba(255,255,255,.2);
}
button::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:
    linear-gradient(90deg,transparent, rgba(255,255,255,.35),transparent);
    transition:.7s;
}
button:hover::before{
    left:130%;
}
button:hover{
    transform:translateY(-3px);
    box-shadow:
    0 18px 38px rgba(34,197,94,.35);
}
button:active{
    transform:scale(.98);
}
.links{
    display:flex;
    gap:14px;
    margin-top:20px;
}
.links a{
    flex:1;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:14px;
    border-radius:16px;
    background:white;
    color:#0f172a;
    border:1px solid #e2e8f0;
    font-size:14px;
    font-weight:700;
    transition:.35s;
    box-shadow:0 6px 18px rgba(0,0,0,.05);
}
.links a:hover{
    transform:translateY(-3px);
    background:
    linear-gradient(135deg,#f0fdf4,#ecfeff);
    border-color:#bbf7d0;
    box-shadow:0 14px 28px rgba(34,197,94,.10);
}
.links a i{
    color:#16a34a;
}
@media(max-width:900px){

    .container{
        flex-direction:column;
    }
    .left,
    .right{
        padding:35px;
    }
    .links{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="left">
        <div class="logo">
            <i class="bi bi-cash-coin"></i>
        </div>
        <h1>Manage Income<br>Beautifully</h1>
        <p>
            Add and organize your earnings with a modern
            and clean finance experience.
        </p>
        <div class="feature">
            <i class="bi bi-graph-up-arrow"></i>
            <span>Track Growth</span>
        </div>
        <div class="feature">
            <i class="bi bi-lightning-charge"></i>
            <span>Quick Entry</span>
        </div>
        <div class="feature">
            <i class="bi bi-piggy-bank"></i>
            <span>Smart Money Control</span>
        </div>
    </div>
    <div class="right">
        <h2>Add Income</h2>
        <p class="sub">Record your income details</p>
        <div class="month">
            <i class="bi bi-calendar-event"></i>
            Adding income for <b>{{month_name}}</b>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="group">
                <label>Date</label>
                <div class="input-box">
                    <i class="bi bi-calendar-date"></i>
                    <input
                    type="date"
                    name="date"
                    value="{{default_date}}"
                    required>
                </div>
            </div>
            <div class="group">
                <label>Amount</label>
                <div class="input-box">
                    <i class="bi bi-wallet2"></i>
                    <input
                    type="number"
                    name="amount"
                    placeholder="Enter amount"
                    required>
                </div>
            </div>

            <div class="group">
                <label>Source</label>
                <div class="input-box">
                    <i class="bi bi-briefcase"></i>
                    <input
                    type="text"
                    name="source"
                    placeholder="Salary / Freelance / Business"
                    required>
                </div>
            </div>

            <button type="submit">
                <i class="bi bi-plus-circle-fill"></i>
                Add Income
            </button>

        </form>

        <div class="links">
            <a href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>
            <a href="#">
                <i class="bi bi-cash-stack"></i>
                Expenses
            </a>
        </div>
    </div>
</div>
</body>
</html>
