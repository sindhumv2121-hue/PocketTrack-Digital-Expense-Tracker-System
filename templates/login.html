<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
            overflow:hidden;
            position:relative;
        }
        body::before,body::after{
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background:rgba(59,130,246,0.15);
            filter:blur(90px);
        }
        body::before{
            top: -100px;
            left: -100px;
        }
        body::after{
            bottom: -100px;
            right: -100px;
        }
        .container{
            width: 420px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:28px;
            padding:40px;
            box-shadow:0 20px 60px rgba(0,0,0,0.45);
            position:relative;
            z-index:4;
        }
        .logo{
            width: 85px;
            height: 85px;
            border-radius: 24px;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#38bdf8);
            color:white;
            font-size:34px;
            box-shadow:0 10px 25px rgba(37,99,235,0.4);
        }
        h1{
            color:white;
            text-align: center;
            margin-bottom: 8px;
            font-size: 30px;
        }
        .subtitle{
            color:#cbd5e1;
            text-align: center;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .form-group{
            margin-bottom: 20px;
        }
        label{
            display: block;
            color:#e2e8f0;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        .input-box{
            position: relative;
        }
        .input-box i{
            position: absolute;
            left: 14px;
            top:50%;
            transform:translateY(-50%);
            color:#94a3b8;
            font-size:18px;
        }
        input{
            width:100%;
            padding:14px 14px 14px 45px;
            border:none;
            border-radius:14px;
            background:rgba(255,255,255,0.08);
            color:white;
            font-size:15px;
            outline:none;
            transition:0.3s;
            border:1px solid transparent;
        }
        input:focus{
            border-color: #38bdf8;
            background: rgba(255,255,255,0.12);
        }
       input::placeholder{
            color:#94a3b8;
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#2563eb,#38bdf8);
            color:white;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }
        button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(56,189,248,0.35);
        }
        .alert{
            background:rgba(240, 16, 16, 0.15);
            color:#fecaca;
            padding:12px;
            border-radius:12px;
            margin-bottom:20px;
            font-size:18px;
            text-align:center;
            border:1px solid rgba(239,68,68,0.2);
        }
        .footer{
            margin-top:24px;
            text-align:center;
            color:#cbd5e1;
            font-size:14px;
        }

        .footer a{
            color:#38bdf8;
            text-decoration:none;
            font-weight: bold;
        }
        .footer a:hover{
            text-decoration: underline;
        }
    
        @media(max-width:500px){
            .container{
                width: 92%;
                padding: 30px 24px;
            }
            h1{
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="bi bi-wallet2"></i>
        </div>
        <h1>Expense Tracker</h1>
        <p class="subtitle">
             Manage your income, expenses and monthly budget easily
        </p>

        {%if messages %}
                {% for msg in messages %}
                    <div class="alert">
                        {{msg}}
                    </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-box">
                             <i class="bi bi-person-fill"></i>
                             <input type="text" name="username" placeholder="Enter Username" required>
                        </div>

                    </div>
                    <div class="form-group">
                          <label>Password</label>
                        <div class="input-box">
                             <i class="bi bi-lock-fill"></i>
                             <input type="password" name="password" placeholder="Enter Password" required>
                        </div>
                    </div>

                    <button type="submit">
                        <i class="bi bi-box-arrow-in-right"></i>
                                    Login
                    </button>
                </form>
                
                <div class="footer">Don't have an account?
                    <a href="{% url 'register' %}">Register</a>
                </div>
    </div>
</body>
</html>
