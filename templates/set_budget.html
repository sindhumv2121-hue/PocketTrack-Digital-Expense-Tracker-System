<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Budget</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.wrapper{
    width:900px;
    display:flex;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}
.left{
    width:40%;
    background:linear-gradient(135deg,#f59e0b,#f97316);
    color:white;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.left i{
    font-size:45px;
    margin-bottom:20px;
}
.left h2{
    font-size:26px;
    margin-bottom:10px;
}
.left p{
    font-size:14px;
    opacity:0.9;
    line-height:1.5;
}
.right{
    width:60%;
    padding:40px;
}
.header{
    margin-bottom:20px;
}
.header h3{
    font-size:22px;
    color:#111827;
}
.header span{
    font-size:13px;
    color:#6b7280;
}
.tag{
    display:inline-block;
    background:#eef2ff;
    color:#4f46e5;
    font-size:12px;
    padding:5px 10px;
    border-radius:20px;
    margin-bottom:10px;
}
.alert{
    background:#ecfeff;
    border:1px solid #bae6fd;
    color:#0369a1;
    padding:10px;
    border-radius:12px;
    font-size:13px;
    margin-bottom:15px;
}
label{
    font-size:13px;
    color:#374151;
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    outline:none;
    font-size:14px;
    transition:0.3s;
}
input:focus{
    border-color:#f59e0b;
    box-shadow:0 0 0 3px rgba(245,158,11,0.15);
}
button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border-radius:999px;
    border:1px solid rgba(245,158,11,0.4);
    background:rgba(245,158,11,0.12);
    backdrop-filter:blur(8px);
    color:#f59e0b;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:0.25s ease;
}
button:hover{
    background:#f59e0b;
    color:white;
    transform:translateY(-2px);
}
.links{
    display:flex;
    gap:12px;
    margin-top:18px;
}
.links a{
    flex:1;
    text-align:center;
    padding:12px;
    border-radius:14px;
    text-decoration:none;
    font-size:13px;
    font-weight:500;
    color:#1f2937;
    background:#ffffff;
    border:1px solid #e5e7eb;
    transition:0.25s;
}
.links a:hover{
    background:#f3f4f6;
    transform:translateY(-1px);
}
@media(max-width:900px){
    .wrapper{
        flex-direction:column;
    }
    .left, .right{
        width:100%;
    }
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="left">
        <i class="bi bi-graph-up-arrow"></i>
        <h2>Budget Manager</h2>
        <p>
            Control your monthly spending by setting a smart budget.
            Track your financial limits easily and stay in control.
        </p>
    </div>
    <div class="right">
        <div class="header">

            <span class="tag">
                <i class="bi bi-calendar-event"></i>
                Monthly Setup
            </span>
            <h3>Set Budget</h3>
            <span>Define your monthly spending limit</span>
        </div>
        {% if alert %}
        <div class="alert">
            <i class="bi bi-check-circle"></i> {{alert_msg}}
        </div>
        {% endif %}
        <form method="POST" id="budgetForm">
            {% csrf_token %}
            <label><i class="bi bi-calendar-month"></i> Month</label>
            <input type="month" name="month" required>
            <label><i class="bi bi-cash-stack"></i> Budget Amount</label>
            <input type="number" name="amount" placeholder="Enter budget amount" required>
            <button type="submit">
                <i class="bi bi-check-circle"></i>
                Save Budget
            </button>
        </form>
        <div class="links">
            <a href="{% url 'add_exp' %}">
                <i class="bi bi-plus-circle"></i> Add Expense
            </a>
            <a href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </div>
    </div>
</div>
<script>
document.getElementById("budgetForm").addEventListener("submit", function(e){
    let amount = document.querySelector('input[name="amount"]').value;
    let month = document.querySelector('input[name="month"]').value;
    let confirmMsg = `Set budget ₹${amount} for ${month}?`;
    if(!confirm(confirmMsg)){
        e.preventDefault();
    }
});
</script>
</body>
</html>
